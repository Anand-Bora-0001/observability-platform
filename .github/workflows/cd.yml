name: Enterprise CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Python Backend
      run: |
        docker build -t observability-backend:${{ github.sha }} ./services/api-python
