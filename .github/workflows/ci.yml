name: Enterprise CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-python-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/backend-python/requirements.txt
    - name: Run Tests
      run: |
        cd services/backend-python
        pytest tests/

  test-go-identity:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    - name: Run Go Tests
      run: |
        cd services/identity-go
        go test ./...

  lint-frontends:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Lint Dashboard
      run: |
        cd apps/dashboard-react
        npm ci
        npm run lint || true
    - name: Lint Admin Portal
      run: |
        cd apps/admin-vue
        npm ci || true
