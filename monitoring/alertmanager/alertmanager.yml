global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  receiver: 'fastapi-backend-webhook'

receivers:
  - name: 'fastapi-backend-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:8000/api/webhooks/alertmanager'
        send_resolved: true
